<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>$</text></svg>">
  <link rel="stylesheet" href="/styles.css">
  <script>

    posthog.init('phc_ozdLaRxnhuBSXA2Ah8tSBxJnnihSWHGgrkDam7qVizdh', {

</head>
<body>
  <div class="container">
    <h1>Settings</h1>
    <p>Configure your Mail Toll endpoint.</p>

    <div class="handle-display" id="handleDisplay"></div>

    <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
      <div class="feature">
        <h3>Emails received</h3>
        <p id="statEmails" style="font-size: 1.5rem; font-weight: 700; color: #1a1a1a;"></p>
      </div>
      <div class="feature">
        <h3>Total earnings</h3>
        <p id="statEarnings" style="font-size: 1.5rem; font-weight: 700; color: #1a1a1a;"></p>
      </div>
    </div>

    <form class="settings-form" id="settingsForm">
      <div class="form-group">
        <label for="price">Price per message (USD)</label>
        <input type="number" id="price" name="price_usd" step="0.01" min="0.01" required>
      </div>

      <div class="form-group">
        <label>Accepted payment rails</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="rails" value="stripe"> Stripe</label>
          <label><input type="checkbox" name="rails" value="coinbase"> Coinbase</label>
          <label><input type="checkbox" name="rails" value="stablecoin"> Stablecoin</label>
          <label><input type="checkbox" name="rails" value="x402"> x402</label>
        </div>
      </div>

      <div class="form-group">
        <label for="wallet">Wallet address (Base network, for receiving USDC)</label>
        <input type="text" id="wallet" name="wallet_address" placeholder="0x...">
      </div>

      <div class="form-group">
        <label for="whitelist">Whitelisted emails (comma-separated)</label>
        <input type="text" id="whitelist" name="whitelist" placeholder="partner@company.com, friend@example.com">
      </div>

      <div class="form-group">
        <label for="preferences">Category preferences</label>
        <textarea id="preferences" name="category_preferences" placeholder="Open to engineering roles and AI tooling partnerships"></textarea>
      </div>

      <button type="submit" class="btn">Save Settings</button>
    </form>

    <div class="status-msg" id="statusMsg"></div>
  </div>

  <script>
    const data = "/*__RECIPIENT_DATA__*/";

    if (data) {
      document.getElementById('handleDisplay').textContent =
        'Your profile: ' + window.location.origin + '/' + data.handle;
      document.getElementById('statEmails').textContent = data.stats.total_emails;
      document.getElementById('statEarnings').textContent = '$' + data.stats.total_earnings_usd.toFixed(2);
      document.getElementById('price').value = data.price_usd;
      document.getElementById('wallet').value = data.wallet_address || '';
      document.getElementById('whitelist').value = (data.whitelist || []).join(', ');
      document.getElementById('preferences').value = data.category_preferences || '';

      const railCheckboxes = document.querySelectorAll('input[name="rails"]');
      railCheckboxes.forEach(cb => {
        cb.checked = data.accepted_rails.includes(cb.value);
      });
    }

    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const statusMsg = document.getElementById('statusMsg');

      const railCheckboxes = document.querySelectorAll('input[name="rails"]:checked');
      const accepted_rails = Array.from(railCheckboxes).map(cb => cb.value);

      const whitelistStr = document.getElementById('whitelist').value.trim();
      const whitelist = whitelistStr ? whitelistStr.split(',').map(s => s.trim()).filter(Boolean) : [];

      const body = {
        price_usd: parseFloat(document.getElementById('price').value),
        accepted_rails,
        wallet_address: document.getElementById('wallet').value.trim() || null,
        whitelist,
        category_preferences: document.getElementById('preferences').value.trim(),
      };

      try {
        const res = await fetch('/settings', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(body),
        });

        if (res.ok) {
          statusMsg.className = 'status-msg success';
          statusMsg.textContent = 'Settings saved successfully.';
        } else {
          const err = await res.json();
          statusMsg.className = 'status-msg error';
          statusMsg.textContent = 'Error: ' + (err.message || err.error);
        }
      } catch (err) {
        statusMsg.className = 'status-msg error';
        statusMsg.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
